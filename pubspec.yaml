name: ilham_portfolio
description: Ilham Mustaqeem's Portfolio Website
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.2.4
  google_fonts: ^6.2.1
  flutter_staggered_animations: ^1.1.0
  font_awesome_flutter: ^10.7.0
  animated_text_kit: ^4.2.2
  timeline_tile: ^2.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  flutter_vector_icons: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    # Or specify the exact file
    - assets\images\photo_6145403992587046632_y.jpg